name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure

      - name: Smoke test
        run: |
          mkdir -p /tmp/makexx_test
          cd /tmp/makexx_test
          ${{ github.workspace }}/build/makexx -c
          test -f makefile
          test -f makefile.hpp
          test -f makefile.cpp
