<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>makexx — dependency graph</title>
<style>
  :root {
    --bg:#0f1216; --panel:#171c22; --line:#2a323c; --fg:#e6edf3; --muted:#8b949e;
    --input:#10b981; --interm:#58a6ff; --final:#f59e0b; --phony:#a78bfa; --tool:#22d3ee;
    --seed:#ffffff;
  }
  * { box-sizing:border-box; }
  /* Keep the `hidden` attribute authoritative against id rules that set display. */
  [hidden] { display:none !important; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font:13px/1.4 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  #bars { position:fixed; top:0; left:0; right:0; z-index:5; background:var(--panel);
    border-bottom:1px solid var(--line); }
  .bar { display:flex; align-items:center; gap:10px; padding:6px 12px; min-height:40px; }
  .bar.r2 { border-top:1px solid var(--line); flex-wrap:wrap; }
  #title { font-weight:600; white-space:nowrap; }
  input[type=text] { background:var(--bg); color:var(--fg); border:1px solid var(--line);
    border-radius:6px; padding:6px 9px; outline:none; }
  #seed { flex:0 0 300px; }
  input[type=text]:focus { border-color:var(--interm); }
  button { background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:6px;
    padding:6px 10px; cursor:pointer; white-space:nowrap; }
  button:hover { border-color:var(--interm); }
  .lbl { color:var(--muted); white-space:nowrap; }
  #tags { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { font-size:12px; padding:3px 9px; border-radius:999px; border:1px solid var(--line);
    background:var(--bg); color:var(--muted); cursor:pointer; }
  .chip.on { border-color:var(--interm); color:var(--fg); background:#13233a; }
  .toggle { display:flex; align-items:center; gap:4px; color:var(--muted); white-space:nowrap; cursor:pointer; }
  #legend { display:flex; gap:12px; margin-left:auto; color:var(--muted); flex-wrap:wrap; }
  #legend span { display:flex; align-items:center; gap:5px; white-space:nowrap; }
  .sw { width:11px; height:11px; border-radius:3px; display:inline-block; }
  #count { color:var(--muted); white-space:nowrap; }
  #cy { position:fixed; left:0; right:0; bottom:0; top:92px; }
  #tip { position:fixed; max-width:380px; background:var(--panel); border:1px solid var(--line);
    border-radius:8px; padding:9px 11px; pointer-events:none; z-index:10; box-shadow:0 6px 24px #0008; }
  #tip .t-name { font-weight:600; word-break:break-all; }
  #tip .t-meta { color:var(--muted); margin-top:2px; }
  #tip .t-help { margin-top:6px; }
  #tip .t-desc { margin-top:6px; color:var(--muted); font-style:italic; }
  #tip .t-tags { margin-top:6px; color:var(--interm); }
  #tip .t-cmds { margin-top:6px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11px;
    white-space:pre-wrap; word-break:break-all; color:#cdd9e5; background:#0c0f13; border-radius:6px;
    padding:6px 8px; border:1px solid var(--line); }
  #empty { position:fixed; inset:92px 0 0 0; display:flex; align-items:center; justify-content:center;
    color:var(--muted); padding:0 24px; text-align:center; }
  #busy { position:fixed; top:50%; left:50%; width:46px; height:46px; z-index:20;
    margin:-23px 0 0 -23px; border:4px solid var(--line); border-top-color:var(--interm);
    border-radius:50%; animation:mxspin .8s linear infinite; }
  @keyframes mxspin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="bars">
  <div class="bar r1">
    <span id="title">dependency graph</span>
    <button data-act="fit" title="Fit to view">Fit</button>
    <button data-act="collapseAll" title="Fold every group">Fold all</button>
    <button data-act="expandAll" title="Unfold every group">Unfold all</button>
    <span id="legend"></span>
    <span id="count"></span>
  </div>
  <div class="bar r2">
    <span class="lbl">Trace:</span>
    <input id="seed" type="text" placeholder="seed by name / pattern (e.g. *_alpha_*) — press Enter  ·  or click nodes  ·  / to focus" autocomplete="off">
    <span id="tags"></span>
    <label class="toggle"><input type="checkbox" id="toInputs" checked> ↑ inputs</label>
    <label class="toggle"><input type="checkbox" id="toFinals"> ↓ finals</label>
    <label class="toggle" title="Apply the seed filter (off = show everything, keep seeds)"><input type="checkbox" id="filterOn" checked> Filter</label>
    <button data-act="expandUp" title="Reveal one level of parents of the selected node">+↑ parents</button>
    <button data-act="expandDown" title="Reveal one level of children of the selected node">+↓ children</button>
    <button data-act="clear" title="Clear seeds + expansions, show everything">Clear</button>
  </div>
</div>
<div id="cy"></div>
<div id="busy" hidden></div>
<div id="tip" hidden></div>
<div id="empty" hidden>No graph data.</div>

<script>/*__MAKEXX_GRAPH_LIBS__*/</script>
<script>
"use strict";
// Data injected by `makexx --build-graph`; the fallback keeps this file a
// valid, openable page on its own (shows the empty state).
const MAKEXX_GRAPH = /*makexx-data-start*/{"title":"","description":"","nodes":[],"edges":[]}/*makexx-data-end*/;

(function () {
  const G = MAKEXX_GRAPH;
  document.getElementById("title").textContent =
    G.title && G.title.length ? G.title : "dependency graph";

  if (!G.nodes || !G.nodes.length) {
    document.getElementById("empty").hidden = false;
    return;
  }

  cytoscape.use(window.cytoscapeDagre);
  cytoscape.use(window.cytoscapeExpandCollapse);

  // --- Build elements (group paths -> nested compound parents) --------------
  const groupIds = new Set();
  function ensureGroup(path, els) {
    if (!path) return undefined;
    const parts = path.split("/");
    let acc = "", parentId;
    for (let i = 0; i < parts.length; i++) {
      acc = i ? acc + "/" + parts[i] : parts[i];
      const id = "grp:" + acc;
      if (!groupIds.has(id)) {
        groupIds.add(id);
        els.push({ data: { id, label: parts[i], parent: parentId }, classes: "group" });
      }
      parentId = id;
    }
    return parentId;
  }

  const els = [];
  for (const n of G.nodes) {
    const parent = ensureGroup(n.group || "", els);
    els.push({
      data: {
        id: n.id, label: n.label || n.id, parent,
        type: n.type || "intermediate", ext: n.ext || "",
        help: n.help || "", desc: n.desc || "",
        tags: n.tags || [], cmds: n.cmds || []
      },
      classes: n.type || "intermediate"
    });
  }
  let ei = 0;
  for (const e of G.edges)
    els.push({ data: { id: "e" + (ei++), source: e.source, target: e.target }, classes: e.tool ? "tool" : "" });

  function dagreLayout() {
    return { name: "dagre", rankDir: "LR", nodeSep: 22, rankSep: 60, edgeSep: 10, fit: true, padding: 30 };
  }

  const cy = cytoscape({
    container: document.getElementById("cy"),
    elements: els,
    wheelSensitivity: 0.3,
    style: [
      { selector: "node", style: {
        "label": "data(label)", "font-size": 11, "color": "#e6edf3",
        "text-valign": "center", "text-halign": "center",
        "shape": "round-rectangle", "width": "label", "height": "label",
        "padding": "7px", "background-color": "#30363d",
        "border-width": 1.5, "border-color": "#484f58" } },
      { selector: "node.input",        style: { "border-color": "var(--input)",  "background-color": "#16241d" } },
      { selector: "node.intermediate", style: { "border-color": "var(--interm)", "background-color": "#13233a" } },
      { selector: "node.final",        style: { "border-color": "var(--final)",  "background-color": "#332208", "border-width": 2.5 } },
      { selector: "node.phony",        style: { "border-color": "var(--phony)",  "background-color": "#241a3a" } },
      { selector: "node.tool",         style: { "border-color": "var(--tool)",   "background-color": "#0c2a30" } },
      { selector: "node.group", style: {
        "label": "data(label)", "text-valign": "top", "text-halign": "center",
        "color": "#8b949e", "font-size": 12, "font-weight": "bold",
        "background-opacity": 1, "background-color": "#ffffff06",
        "border-color": "#3a424d", "border-width": 1, "border-style": "dashed",
        "padding": "16px", "text-margin-y": -2 } },
      { selector: "node.seed", style: { "border-color": "var(--seed)", "border-width": 3 } },
      { selector: "edge", style: {
        "width": 1.4, "line-color": "#3a424d", "target-arrow-color": "#3a424d",
        "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge.tool", style: { "line-style": "dashed", "line-color": "var(--tool)", "target-arrow-color": "var(--tool)" } }
    ],
    layout: { name: "null" }   // no layout at init — applyFilter() lays out only what's shown
  });
  const BIG_NODES = 400, BIG_EDGES = 1200;   // above this, never draw the whole graph (dagre can't)
  const EMPTY = document.getElementById("empty");
  const BUSY = document.getElementById("busy");
  function showHint(msg) { EMPTY.textContent = msg; EMPTY.hidden = false; }
  function hideHint() { EMPTY.hidden = true; }
  // Show the spinner, let the browser paint it (double rAF), then run the
  // synchronous filter + layout. The spinner is CSS-animated so it keeps
  // turning on the compositor even while the main thread is blocked by dagre.
  function scheduleFilter() {
    BUSY.hidden = false;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      try { applyFilter(); } finally { BUSY.hidden = true; }
    }));
  }
  // Reveal one level of parents (up) or children (down) of the selected
  // node(s), accumulating, so you can walk the graph one hop at a time.
  function expand(dir) {
    const sel = cy.nodes(":selected").filter(isLeaf);
    if (!sel.length) return;
    const hop = (dir === "up") ? sel.incomers("node") : sel.outgoers("node");
    sel.forEach(n => revealed.add(n.id()));
    hop.forEach(n => revealed.add(n.id()));
    scheduleFilter();
  }

  const api = cy.expandCollapse({ layoutBy: dagreLayout, fisheye: false, animate: false, undoable: false, expandCollapseCascade: true });

  function relayout() { cy.elements(":visible").layout(dagreLayout()).run(); }

  // --- Legend + counts ------------------------------------------------------
  const present = new Set(G.nodes.map(n => n.type || "intermediate"));
  const colors = { input:"var(--input)", intermediate:"var(--interm)", final:"var(--final)", phony:"var(--phony)", tool:"var(--tool)" };
  const legend = document.getElementById("legend");
  for (const cls of ["input","intermediate","final","phony","tool"]) {
    if (!present.has(cls)) continue;
    const s = document.createElement("span");
    s.innerHTML = '<i class="sw" style="background:' + colors[cls] + '"></i>' + cls;
    legend.appendChild(s);
  }
  const isLeaf = n => !n.hasClass("group");
  function updateCount(v) {
    const total = cy.nodes().filter(isLeaf).length;
    let s;
    if (v == null) s = total + " targets · " + G.edges.length + " deps";
    else if (typeof v === "number") s = v + " of " + total + " targets shown";
    else s = v;
    document.getElementById("count").textContent = s;
  }

  // --- Tag chips ------------------------------------------------------------
  const allTags = new Set();
  for (const n of G.nodes) for (const t of (n.tags || [])) allTags.add(t);
  const activeTags = new Set();
  const tagsBox = document.getElementById("tags");
  [...allTags].sort().forEach(t => {
    const b = document.createElement("button");
    b.className = "chip"; b.textContent = "#" + t;
    b.onclick = () => { b.classList.toggle("on"); activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t); scheduleFilter(); };
    tagsBox.appendChild(b);
  });

  // --- Seed-driven filtering ------------------------------------------------
  const seedInput = document.getElementById("seed");
  const toInputs = document.getElementById("toInputs");
  const toFinals = document.getElementById("toFinals");
  const filterOn = document.getElementById("filterOn");
  const pinned = new Set();    // node ids the user clicked to seed
  const revealed = new Set();  // node ids manually revealed via expand ↑/↓ (accumulates)

  function tokenToRegex(tok) {
    const esc = tok.replace(/[.+?^${}()|[\]\\]/g, "\\$&");
    return tok.includes("*") ? new RegExp("^" + esc.replace(/\*/g, ".*") + "$", "i")
                             : new RegExp(esc, "i");   // bare token = substring
  }
  function seedRegexes() {
    return seedInput.value.split(/[\s,]+/).filter(Boolean).map(tokenToRegex);
  }
  function seedActive() { return seedInput.value.trim() !== "" || activeTags.size > 0 || pinned.size > 0; }
  function isSeed(node, regexes) {
    const d = node.data();
    if (pinned.has(d.id)) return true;
    if (activeTags.size) for (const t of (d.tags || [])) if (activeTags.has(t)) return true;
    for (const re of regexes) if (re.test(d.id)) return true;
    return false;
  }

  function applyFilter() {
    cy.nodes().removeClass("seed");
    const nLeaf = cy.nodes().filter(isLeaf).length;
    const big = nLeaf > BIG_NODES || cy.edges().length > BIG_EDGES;
    const seeds = seedActive()
      ? cy.nodes().filter(n => isLeaf(n) && isSeed(n, seedRegexes()))
      : cy.collection();
    seeds.addClass("seed");                          // outline seeds always

    // Apply the filter only when there are seeds and Filter is on.
    if (seedActive() && filterOn.checked && seeds.length > 0) {
      // "Connect the seeds": every node on a path between two seeds = nodes
      // both downstream of some seed and upstream of some seed.
      const down = seeds.union(seeds.successors().nodes());
      const up   = seeds.union(seeds.predecessors().nodes());
      let vis = down.intersection(up);
      if (toInputs.checked) vis = vis.union(vis.predecessors().nodes());   // upstream to inputs
      if (toFinals.checked) vis = vis.union(vis.successors().nodes());     // downstream to finals
      if (revealed.size) vis = vis.union(cy.nodes().filter(n => revealed.has(n.id())));  // manual expansions
      const ele = vis.union(vis.edgesWith(vis)).union(vis.ancestors());    // + edges + group boxes
      cy.elements().style("display", "none");
      ele.style("display", "element");
      hideHint(); relayout();
      updateCount(vis.filter(isLeaf).length);
      return;
    }
    // Seeds set but nothing matched.
    if (seedActive() && filterOn.checked && seeds.length === 0) {
      cy.elements().style("display", "none"); hideHint(); updateCount(0); return;
    }
    // Not filtering (no seeds, or Filter off). A big graph can't be drawn
    // whole — show a hint and wait for a seed rather than hang dagre on it.
    if (big) {
      // If the user has manually expanded a neighborhood, show that instead
      // of the hint (lets exploration persist after clearing the seed text).
      const rev = cy.nodes().filter(n => revealed.has(n.id()));
      if (rev.length) {
        const ele = rev.union(rev.edgesWith(rev)).union(rev.ancestors());
        cy.elements().style("display", "none"); ele.style("display", "element");
        hideHint(); relayout(); updateCount(rev.filter(isLeaf).length);
        return;
      }
      cy.elements().style("display", "none");
      showHint("Large graph — " + nLeaf + " targets, " + cy.edges().length + " deps. Too big to draw "
        + "whole; seed a filter to begin: type a name or pattern (e.g. *_alpha_*) in the Trace box, "
        + "or pick a #tag." + (seedActive() && !filterOn.checked ? "  (Filter is currently off.)" : ""));
      updateCount(seedActive() ? (seeds.length + " seeds · filter off") : null);
      return;
    }
    // Small graph: safe to draw everything (seeds stay highlighted).
    cy.elements().style("display", "element");
    hideHint(); relayout();
    updateCount(seedActive() ? (seeds.length + " seeds · filter off") : null);
  }

  // Filter only on Enter — live per-keystroke filtering froze large graphs.
  seedInput.addEventListener("keydown", e => { if (e.key === "Enter") scheduleFilter(); });
  toInputs.addEventListener("change", scheduleFilter);
  toFinals.addEventListener("change", scheduleFilter);
  filterOn.addEventListener("change", scheduleFilter);
  document.addEventListener("keydown", e => {
    if (e.key === "/" && document.activeElement !== seedInput) { e.preventDefault(); seedInput.focus(); }
  });

  document.getElementById("bars").addEventListener("click", e => {
    const act = e.target && e.target.getAttribute && e.target.getAttribute("data-act");
    if (!act) return;
    if (act === "fit") cy.animate({ fit: { eles: cy.elements(":visible"), padding: 30 } }, { duration: 250 });
    else if (act === "collapseAll") api.collapseAll();
    else if (act === "expandAll") api.expandAll();
    else if (act === "expandUp") expand("up");
    else if (act === "expandDown") expand("down");
    else if (act === "clear") {
      seedInput.value = "";
      activeTags.clear();
      pinned.clear();
      revealed.clear();
      [...tagsBox.children].forEach(c => c.classList.remove("on"));
      toInputs.checked = true; toFinals.checked = false; filterOn.checked = true;
      scheduleFilter();
    }
  });

  // --- Hover tooltip (now incl. tags + the recipe commands) -----------------
  const tip = document.getElementById("tip");
  function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }
  function showTip(node, ev) {
    if (node.hasClass("group")) { tip.hidden = true; return; }
    const d = node.data();
    const meta = [d.type, d.ext ? "." + d.ext : null].filter(Boolean).join(" · ");
    let html = '<div class="t-name">' + esc(d.id) + "</div>";
    if (meta) html += '<div class="t-meta">' + esc(meta) + "</div>";
    if (d.help) html += '<div class="t-help">' + esc(d.help) + "</div>";
    if (d.desc) html += '<div class="t-desc">' + esc(d.desc) + "</div>";
    if (d.tags && d.tags.length) html += '<div class="t-tags">' + d.tags.map(t => "#" + esc(t)).join("  ") + "</div>";
    if (d.cmds && d.cmds.length) html += '<div class="t-cmds">' + d.cmds.map(esc).join("\n") + "</div>";
    tip.innerHTML = html;
    tip.hidden = false;
    const x = ev.originalEvent.clientX, y = ev.originalEvent.clientY;
    tip.style.left = Math.min(x + 14, window.innerWidth - tip.offsetWidth - 8) + "px";
    tip.style.top = Math.min(y + 14, window.innerHeight - tip.offsetHeight - 8) + "px";
  }
  cy.on("mouseover", "node", e => showTip(e.target, e));
  cy.on("mousemove", "node", e => { if (!tip.hidden) showTip(e.target, e); });
  cy.on("mouseout", "node", () => { tip.hidden = true; });
  // Click a node to toggle it as a seed.
  cy.on("tap", "node", e => {
    if (e.target.hasClass("group")) return;
    const id = e.target.id();
    pinned.has(id) ? pinned.delete(id) : pinned.add(id);
    scheduleFilter();
  });
  cy.on("tap", () => { tip.hidden = true; });

  applyFilter();   // initial view: full graph if small, "seed to begin" hint if big
})();
</script>
</body>
</html>
