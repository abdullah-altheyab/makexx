<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>makexx — dependency graph</title>
<style>
  :root {
    --bg:#0f1216; --panel:#171c22; --line:#2a323c; --fg:#e6edf3; --muted:#8b949e;
    --input:#10b981; --interm:#58a6ff; --final:#f59e0b; --phony:#a78bfa; --tool:#22d3ee;
    --seed:#ffe000;   /* yellow — seed highlight (chips); seed nodes use the same literal */
    --chipon:#13233a; --hover:#1b2530;
  }
  /* Light theme: only the neutrals flip; accent hues stay readable on both. */
  html.light {
    --bg:#ffffff; --panel:#f4f6f8; --line:#d0d7de; --fg:#1f2328; --muted:#57606a;
    --chipon:#dbe9ff; --hover:#eef1f4;
  }
  * { box-sizing:border-box; }
  /* Keep the `hidden` attribute authoritative against id rules that set display. */
  [hidden] { display:none !important; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font:13px/1.4 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  #bars { position:fixed; top:0; left:0; right:0; z-index:5; background:var(--panel);
    border-bottom:1px solid var(--line); }
  .bar { display:flex; align-items:center; gap:10px; padding:6px 12px; min-height:40px; }
  .bar.r2 { border-top:1px solid var(--line); flex-wrap:wrap; }
  #title { font-weight:600; white-space:nowrap; }
  input[type=text] { background:var(--bg); color:var(--fg); border:1px solid var(--line);
    border-radius:6px; padding:6px 9px; outline:none; }
  #seed { flex:0 0 300px; }
  input[type=text]:focus { border-color:#58a6ff; }
  button { background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:6px;
    padding:6px 10px; cursor:pointer; white-space:nowrap; }
  button:hover { border-color:#58a6ff; }
  .lbl { color:var(--muted); white-space:nowrap; }
  #tags, #seeds { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { font-size:12px; padding:3px 9px; border-radius:999px; border:1px solid var(--line);
    background:var(--bg); color:var(--muted); cursor:pointer; }
  .chip.on { border-color:#58a6ff; color:var(--fg); background:var(--chipon); }
  .chip.seedchip { border-color:var(--seed); color:var(--fg); }
  #nodebar { position:fixed; z-index:15; display:flex; gap:2px; padding:3px;
    background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:0 2px 12px #000a; }
  #nodebar button { font:11px/1 sans-serif; padding:4px 6px; min-width:26px; border-radius:5px;
    border:1px solid var(--line); background:var(--bg); color:var(--fg); cursor:pointer; }
  #nodebar button:hover { border-color:#58a6ff; color:#58a6ff; }
  .toggle { display:flex; align-items:center; gap:4px; color:var(--muted); white-space:nowrap; cursor:pointer; }
  #legend { display:flex; gap:12px; margin-left:auto; color:var(--muted); flex-wrap:wrap; }
  #legend span { display:flex; align-items:center; gap:5px; white-space:nowrap; cursor:pointer; }
  #legend span:hover { color:var(--fg); }
  .sw { width:11px; height:11px; border-radius:3px; display:inline-block; }
  #count { color:var(--muted); white-space:nowrap; }
  #picker { position:fixed; top:96px; right:12px; width:320px; max-height:72vh; z-index:25;
    display:flex; flex-direction:column; background:var(--panel); border:1px solid var(--line);
    border-radius:8px; box-shadow:0 6px 28px #000b; }
  #picker .ph { display:flex; align-items:center; gap:8px; padding:8px 10px; border-bottom:1px solid var(--line); }
  #picker .ph .ptitle { font-weight:600; flex:1; }
  #picker .ph .pback { font:11px/1 sans-serif; padding:3px 7px; border-radius:5px;
    border:1px solid var(--line); background:var(--bg); color:var(--fg); cursor:pointer; }
  #picker .ph .pback:hover { border-color:#58a6ff; color:#58a6ff; }
  #picker #pfilter { margin:8px 10px 4px; }
  #picker .plist { overflow:auto; padding:2px 6px; flex:1; }
  #picker .prow { display:flex; align-items:center; gap:8px; padding:4px 8px; border-radius:5px; cursor:pointer;
    font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11px; }
  #picker .prow .plbl { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #picker .prow:hover { background:var(--hover); }
  #picker .prow.on { color:var(--seed); }
  #picker .prow .pinbtn { font:10px/1 sans-serif; padding:3px 6px; border-radius:4px; flex:none;
    border:1px solid var(--line); background:var(--bg); color:var(--muted); cursor:pointer; }
  #picker .prow .pinbtn.pinned { color:var(--seed); border-color:var(--seed); }
  #picker .pgrp { font:600 11px/1.4 sans-serif; color:var(--muted); padding:5px 8px; cursor:pointer;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #picker .pgrp:hover { color:var(--fg); }
  #picker .prow .mdesc { color:var(--muted); }
  .barchip { display:inline-flex; align-items:center; gap:0; }
  .barchip .barlbl { cursor:pointer; }
  .barchip .barx { cursor:pointer; margin-left:5px; opacity:.55; }
  .barchip .barx:hover { opacity:1; }
  #picker .pfoot { display:flex; align-items:center; gap:8px; padding:8px 10px; border-top:1px solid var(--line);
    color:var(--muted); }
  #cy { position:fixed; left:0; right:0; bottom:0; top:92px; }
  #tip { position:fixed; max-width:380px; background:var(--panel); border:1px solid var(--line);
    border-radius:8px; padding:9px 11px; pointer-events:none; z-index:10; box-shadow:0 6px 24px #0008; }
  #tip .t-name { font-weight:600; word-break:break-all; }
  #tip .t-meta { color:var(--muted); margin-top:2px; }
  #tip .t-help { margin-top:6px; }
  #tip .t-desc { margin-top:6px; color:var(--muted); font-style:italic; }
  #tip .t-tags { margin-top:6px; color:#58a6ff; }
  #tip .t-cmds { margin-top:6px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11px;
    white-space:pre-wrap; word-break:break-all; color:#cdd9e5; background:#0c0f13; border-radius:6px;
    padding:6px 8px; border:1px solid var(--line); }
  #tip .t-cmds .t-num { color:#6b7785; user-select:none; }
  #tip .t-cmds .t-more { color:var(--muted); font-style:italic; }
  #empty { position:fixed; inset:92px 0 0 0; display:flex; align-items:center; justify-content:center;
    color:var(--muted); padding:0 24px; text-align:center; }
  #busy { position:fixed; top:50%; left:50%; width:46px; height:46px; z-index:20;
    margin:-23px 0 0 -23px; border:4px solid var(--line); border-top-color:#58a6ff;
    border-radius:50%; animation:mxspin .8s linear infinite; }
  @keyframes mxspin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="bars">
  <div class="bar r1">
    <span id="title">dependency graph</span>
    <button data-act="menu" title="Browse targets by group (like makexx -i) and pick seeds">Menu</button>
    <button data-act="fit" title="Fit to view">Fit</button>
    <button data-act="png" title="Download the current view as a PNG image">PNG</button>
    <button data-act="svg" title="Download the current view as a vector SVG">SVG</button>
    <button data-act="theme" title="Toggle light / dark background">☀ Light</button>
    <button data-act="unhide" title="Un-hide all manually hidden nodes">Unhide</button>
    <button data-act="collapseAll" title="Fold every group">Fold all</button>
    <button data-act="expandAll" title="Unfold every group">Unfold all</button>
    <span id="legend"></span>
    <span id="count"></span>
  </div>
  <div class="bar r2">
    <span class="lbl">Trace:</span>
    <input id="seed" type="text" placeholder="seed by name / pattern (e.g. *_alpha_*) — Enter  ·  dbl-click a node to seed  ·  / to focus" autocomplete="off">
    <button data-act="clearSeed" title="clear the search box">✕</button>
    <span id="seeds"></span>
    <span id="tags"></span>
    <label class="toggle"><input type="checkbox" id="toInputs"> ← inputs</label>
    <label class="toggle"><input type="checkbox" id="toFinals"> → finals</label>
    <label class="toggle" title="Apply the seed filter (off = show everything, keep seeds)"><input type="checkbox" id="filterOn" checked> Filter</label>
    <label class="toggle" title="Connect 2+ seeds ignoring edge direction — shows how they're related"><input type="checkbox" id="linkMode"> ↔ Link</label>
    <button data-act="reset" title="Reset expansions, hidden nodes &amp; modifiers — but keep the seeds">Reset</button>
    <button data-act="clear" title="Clear seeds + expansions, show everything">Clear</button>
  </div>
</div>
<div id="cy"></div>
<div id="busy" hidden></div>
<div id="nodebar" hidden>
  <button data-na="allUp"    title="reveal ALL upstream / parents (to inputs)">⇤</button>
  <button data-na="exUp"     title="reveal parents — one level">←</button>
  <button data-na="hideUp"   title="hide everything upstream">⊘←</button>
  <button data-na="hideNode" title="hide this node">✕</button>
  <button data-na="hideDown" title="hide everything downstream">⊘→</button>
  <button data-na="exDown"   title="reveal children — one level">→</button>
  <button data-na="allDown"  title="reveal ALL downstream / children (to finals)">⇥</button>
</div>
<div id="tip" hidden></div>
<div id="picker" hidden>
  <div class="ph"><button data-pk="back" class="pback" title="back to tags" hidden>← Back</button><span class="ptitle"></span><button data-pk="close" title="close">✕</button></div>
  <input id="pfilter" type="text" placeholder="filter…" autocomplete="off">
  <div class="plist"></div>
  <div class="pfoot"><button data-pk="addall">Add all shown</button><span class="pcount"></span></div>
</div>
<div id="empty" hidden>No graph data.</div>

<script>/*__MAKEXX_GRAPH_LIBS__*/</script>
<script>
"use strict";
// Data injected by `makexx --build-graph`; the fallback keeps this file a
// valid, openable page on its own (shows the empty state).
const MAKEXX_GRAPH = /*makexx-data-start*/{"title":"","description":"","nodes":[],"edges":[]}/*makexx-data-end*/;

(function () {
  const G = MAKEXX_GRAPH;
  document.getElementById("title").textContent =
    G.title && G.title.length ? G.title : "dependency graph";

  if (!G.nodes || !G.nodes.length) {
    document.getElementById("empty").hidden = false;
    return;
  }

  cytoscape.use(window.cytoscapeDagre);
  cytoscape.use(window.cytoscapeExpandCollapse);
  // cytoscape-svg auto-registers on load; use() again would throw "already
  // exists", so guard it — covers a future build that stops auto-registering.
  try { if (window.cytoscapeSvg) cytoscape.use(window.cytoscapeSvg); } catch (e) {}

  // --- Build elements (group paths -> nested compound parents) --------------
  const groupIds = new Set();
  function ensureGroup(path, els) {
    if (!path) return undefined;
    const parts = path.split("/");
    let acc = "", parentId;
    for (let i = 0; i < parts.length; i++) {
      acc = i ? acc + "/" + parts[i] : parts[i];
      const id = "grp:" + acc;
      if (!groupIds.has(id)) {
        groupIds.add(id);
        els.push({ data: { id, label: parts[i], parent: parentId }, classes: "group" });
      }
      parentId = id;
    }
    return parentId;
  }

  const els = [];
  for (const n of G.nodes) {
    const parent = ensureGroup(n.group || "", els);
    els.push({
      data: {
        id: n.id, label: n.label || n.id, parent,
        type: n.type || "intermediate", ext: n.ext || "",
        help: n.help || "", desc: n.desc || "",
        tags: n.tags || [], cmds: n.cmds || [], srcline: n.srcline || 0
      },
      classes: n.type || "intermediate"
    });
  }
  let ei = 0;
  for (const e of G.edges)
    els.push({ data: { id: "e" + (ei++), source: e.source, target: e.target }, classes: e.tool ? "tool" : "" });

  function dagreLayout() {
    return { name: "dagre", rankDir: "LR", nodeSep: 22, rankSep: 60, edgeSep: 10, fit: true, padding: 30 };
  }

  // Cytoscape ignores CSS var(), so the canvas carries its own two palettes.
  // Only the neutrals differ between themes; the type-accent hues (green/blue/
  // amber/violet/cyan) and the seed yellow read on both backgrounds and stay put.
  const THEMES = {
    dark:  { nodeText:"#e6edf3", nodeBg:"#30363d", nodeBorder:"#484f58",
             inBg:"#16241d", imBg:"#13233a", fnBg:"#332208", phBg:"#241a3a", tlBg:"#0c2a30",
             grpText:"#8b949e", grpBg:"#ffffff06", grpBorder:"#3a424d",
             seedText:"#ffffff", edge:"#3a424d", tool:"#22d3ee" },
    light: { nodeText:"#1f2328", nodeBg:"#eef1f4", nodeBorder:"#aab2bd",
             inBg:"#e3f5ec", imBg:"#e1edff", fnBg:"#fdf0d9", phBg:"#efe8fd", tlBg:"#dcf5fa",
             grpText:"#57606a", grpBg:"#00000008", grpBorder:"#c2c9d1",
             seedText:"#1f2328", edge:"#aeb6bf", tool:"#0e9bbb" }
  };
  function cyStyle(p) { return [
    { selector: "node", style: {
      "label": "data(label)", "font-size": 11, "color": p.nodeText,
      "text-valign": "center", "text-halign": "center",
      "shape": "round-rectangle", "width": "label", "height": "label",
      "padding": "7px", "background-color": p.nodeBg,
      "border-width": 1, "border-color": p.nodeBorder } },
    { selector: "node.input",        style: { "border-color": "#10b981", "background-color": p.inBg } },
    { selector: "node.intermediate", style: { "border-color": "#58a6ff", "background-color": p.imBg } },
    { selector: "node.final",        style: { "border-color": "#f59e0b", "background-color": p.fnBg, "border-width": 1.5 } },
    { selector: "node.phony",        style: { "border-color": "#a78bfa", "background-color": p.phBg } },
    { selector: "node.tool",         style: { "border-color": "#22d3ee", "background-color": p.tlBg } },
    { selector: "node.group", style: {
      "label": "data(label)", "text-valign": "top", "text-halign": "center",
      "color": p.grpText, "font-size": 12, "font-weight": "bold",
      "background-opacity": 1, "background-color": p.grpBg,
      "border-color": p.grpBorder, "border-width": 1, "border-style": "dashed",
      "padding": "16px", "text-margin-y": -2 } },
    { selector: "node.seed", style: {
      "border-color": "#ffe000", "border-width": 4,
      "color": p.seedText, "font-weight": "bold",
      "z-index": 9999 } },
    { selector: "edge", style: {
      "width": 1.4, "line-color": p.edge, "target-arrow-color": p.edge,
      "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
    { selector: "edge.tool", style: { "line-style": "dashed", "line-color": p.tool, "target-arrow-color": p.tool } }
  ]; }
  let theme = "dark";
  const cy = cytoscape({
    container: document.getElementById("cy"),
    elements: els,
    wheelSensitivity: 0.3,
    style: cyStyle(THEMES.dark),
    layout: { name: "null" }   // no layout at init — applyFilter() lays out only what's shown
  });
  function setTheme(t) {
    theme = t;
    document.documentElement.classList.toggle("light", t === "light");
    cy.style().fromJson(cyStyle(THEMES[t])).update();   // re-skin canvas; positions kept
    const btn = document.querySelector('[data-act="theme"]');
    if (btn) btn.textContent = t === "light" ? "🌙 Dark" : "☀ Light";
  }
  const BIG_NODES = 400, BIG_EDGES = 1200;   // above this, never draw the whole graph (dagre can't)
  const EMPTY = document.getElementById("empty");
  const BUSY = document.getElementById("busy");
  function showHint(msg) { EMPTY.textContent = msg; EMPTY.hidden = false; }
  function hideHint() { EMPTY.hidden = true; }
  // Show the spinner, let the browser paint it (double rAF), then run the
  // synchronous filter + layout. The spinner is CSS-animated so it keeps
  // turning on the compositor even while the main thread is blocked by dagre.
  function scheduleFilter() {
    BUSY.hidden = false;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      try { applyFilter(); } finally { BUSY.hidden = true; placeHandles(); }
    }));
  }
  // Reveal nodes around `node` into the persistent `revealed` set.
  // dir "up"/"down"; all=false → one level (incomers/outgoers), all=true →
  // the whole cone to inputs/finals (predecessors/successors).
  function reveal(node, dir, all) {
    if (!node || node.hasClass("group")) return;
    const hop = dir === "up"
      ? (all ? node.predecessors("node") : node.incomers("node"))
      : (all ? node.successors("node")   : node.outgoers("node"));
    revealed.add(node.id());
    hop.forEach(n => revealed.add(n.id()));
    scheduleFilter();
  }
  // Hide a node, or everything up/downstream of it (into the `hidden` set).
  function hideAround(node, what) {
    if (!node || node.hasClass("group")) return;
    if (what === "node") hidden.add(node.id());
    else (what === "up" ? node.predecessors("node") : node.successors("node"))
           .forEach(n => hidden.add(n.id()));
    scheduleFilter();
  }

  const api = cy.expandCollapse({ layoutBy: dagreLayout, fisheye: false, animate: false, undoable: false, expandCollapseCascade: true });

  function relayout() { cy.elements(":visible").layout(dagreLayout()).run(); }

  // --- Legend + counts ------------------------------------------------------
  const present = new Set(G.nodes.map(n => n.type || "intermediate"));
  const colors = { input:"#10b981", intermediate:"#58a6ff", final:"#f59e0b", phony:"#a78bfa", tool:"#22d3ee" };
  const legend = document.getElementById("legend");
  for (const cls of ["input","intermediate","final","phony","tool"]) {
    if (!present.has(cls)) continue;
    const s = document.createElement("span");
    s.innerHTML = '<i class="sw" style="background:' + colors[cls] + '"></i>' + cls;
    s.title = "list all " + cls + " targets to add";
    s.onclick = () => openNodePicker(cls, n => (n.type || "intermediate") === cls);
    legend.appendChild(s);
  }
  const isLeaf = n => !n.hasClass("group");
  function updateCount(v) {
    const total = cy.nodes().filter(isLeaf).length;
    let s;
    if (v == null) s = total + " targets · " + G.edges.length + " deps";
    else if (typeof v === "number") s = v + " of " + total + " targets shown";
    else s = v;
    document.getElementById("count").textContent = s;
  }

  // --- Tags -----------------------------------------------------------------
  // The toolbar shows ONE "Tags ▾" button, not a chip per tag (that would
  // overflow). The browser is the single entry point: from it you either drill
  // into a tag's node list, or pin a tag to the bar as a quick-access chip.
  const allTags = new Set();
  for (const n of G.nodes) for (const t of (n.tags || [])) allTags.add(t);
  const sortedTags = [...allTags].sort();
  const tagsBox = document.getElementById("tags");
  const barTags = new Set();   // tags the user promoted to the toolbar
  function renderTagChips() {
    tagsBox.innerHTML = "";
    if (!sortedTags.length) return;
    const more = document.createElement("button");
    more.className = "chip"; more.textContent = "Tags ▾ (" + sortedTags.length + ")";
    more.title = "browse all tags"; more.onclick = openTagBrowser;
    tagsBox.appendChild(more);
    [...barTags].sort().forEach(t => {
      const wrap = document.createElement("span"); wrap.className = "chip barchip";
      const lbl = document.createElement("span"); lbl.className = "barlbl";
      lbl.textContent = "#" + t; lbl.title = "list #" + t + " nodes to add";
      lbl.onclick = () => openNodePicker("#" + t, n => (n.tags || []).includes(t), openTagBrowser);
      const x = document.createElement("span"); x.className = "barx"; x.textContent = "×";
      x.title = "remove from bar";
      x.onclick = e => { e.stopPropagation(); barTags.delete(t); renderTagChips(); };
      wrap.append(lbl, x); tagsBox.appendChild(wrap);
    });
  }
  renderTagChips();

  // --- Seed-driven filtering ------------------------------------------------
  const seedInput = document.getElementById("seed");
  const toInputs = document.getElementById("toInputs");
  const toFinals = document.getElementById("toFinals");
  const filterOn = document.getElementById("filterOn");
  const linkMode = document.getElementById("linkMode");
  const pinned = new Set();    // seed node ids (added by double-click, or patterns/tags)
  const revealed = new Set();  // node ids revealed via on-node ⊕ handles (accumulates)
  const hidden = new Set();    // node ids manually hidden (Hide / Hide ↑ / Hide ↓)

  // On-node action bar (floats above the hovered/selected node).
  const cyDiv = document.getElementById("cy");
  const nodebar = document.getElementById("nodebar");
  const seedsBox = document.getElementById("seeds");
  let selNode = null;
  function placeHandles() {
    if (!selNode || selNode.removed() || !selNode.visible()) { nodebar.hidden = true; return; }
    nodebar.hidden = false;                         // unhide first so offsetWidth is measurable
    const bb = selNode.renderedBoundingBox();
    const r = cyDiv.getBoundingClientRect();
    const cx = r.left + (bb.x1 + bb.x2) / 2 - nodebar.offsetWidth / 2;
    nodebar.style.left = Math.max(4, Math.min(cx, window.innerWidth - nodebar.offsetWidth - 4)) + "px";
    nodebar.style.top  = Math.max(46, r.top + bb.y1 - nodebar.offsetHeight - 8) + "px";
  }
  // Bar buttons (data-na = node action) act on the current selNode.
  nodebar.addEventListener("click", e => {
    const a = e.target && e.target.getAttribute && e.target.getAttribute("data-na");
    if (!a || !selNode) return;
    if (a === "exUp")        reveal(selNode, "up", false);
    else if (a === "exDown") reveal(selNode, "down", false);
    else if (a === "allUp")  reveal(selNode, "up", true);
    else if (a === "allDown") reveal(selNode, "down", true);
    else if (a === "hideUp")   hideAround(selNode, "up");
    else if (a === "hideDown") hideAround(selNode, "down");
    else if (a === "hideNode") hideAround(selNode, "node");
  });
  // The bar shows on hover (transient, short delay so it's reachable) or is
  // pinned by a single click. Hovering the bar keeps it open.
  let stickyHandles = false, hideTimer = null;
  function scheduleHide() {
    if (stickyHandles) return;
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => { selNode = null; placeHandles(); }, 220);
  }
  nodebar.addEventListener("mouseenter", () => clearTimeout(hideTimer));
  nodebar.addEventListener("mouseleave", scheduleHide);

  // Cleanable list of pinned (double-clicked) seeds.
  function renderSeedChips() {
    seedsBox.innerHTML = "";
    [...pinned].forEach(id => {
      const c = document.createElement("button");
      c.className = "chip on seedchip"; c.textContent = id + "  ×"; c.title = "remove this seed";
      c.onclick = () => { pinned.delete(id); renderSeedChips(); scheduleFilter(); };
      seedsBox.appendChild(c);
    });
  }

  // --- Picker: lists nodes (by type or tag) to add as seeds; or browses tags -
  const picker = document.getElementById("picker");
  const pfilter = document.getElementById("pfilter");
  const plist = picker.querySelector(".plist");
  const ptitle = picker.querySelector(".ptitle");
  const pcount = picker.querySelector(".pcount");
  const paddall = picker.querySelector('[data-pk="addall"]');
  const pback = picker.querySelector('[data-pk="back"]');
  let pickPred = null, pickTitle = "", curRender = () => {}, pickBack = null;

  // Node-list mode: every node matching `pred` (filtered), click to add as seed.
  // `back` (optional) is shown as "← Back" — used when we drilled in from the
  // tag browser so the user can return to the tag list.
  function openNodePicker(title, pred, back) {
    pickPred = pred; pickTitle = title; pickBack = back || null;
    paddall.hidden = false; pback.hidden = !pickBack; curRender = renderNodePicker;
    pfilter.value = ""; picker.hidden = false; curRender(); pfilter.focus();
  }
  function renderNodePicker() {
    const q = pfilter.value.trim().toLowerCase();
    const items = G.nodes.filter(n => pickPred(n) && (!q || n.id.toLowerCase().includes(q)));
    ptitle.textContent = pickTitle + " — " + items.length;
    plist.innerHTML = "";
    items.forEach(n => {
      const on = pinned.has(n.id);
      const row = document.createElement("div");
      row.className = "prow" + (on ? " on" : "");
      const lbl = document.createElement("span");
      lbl.className = "plbl"; lbl.textContent = (on ? "● " : "  ") + n.id; lbl.title = n.id;
      row.appendChild(lbl);
      row.onclick = () => { pinned.has(n.id) ? pinned.delete(n.id) : pinned.add(n.id); renderSeedChips(); renderNodePicker(); scheduleFilter(); };
      plist.appendChild(row);
    });
    pcount.textContent = items.length + " shown";
  }

  // Tag-browser mode: list all tag values (with counts). Click a tag name to
  // drill into its node list; click "pin"/"on bar" to promote it to the toolbar.
  const tagCount = new Map();
  for (const n of G.nodes) for (const t of (n.tags || [])) tagCount.set(t, (tagCount.get(t) || 0) + 1);
  function openTagBrowser() {
    paddall.hidden = true; pback.hidden = true; pickBack = null; curRender = renderTagList;
    pfilter.value = ""; picker.hidden = false; curRender(); pfilter.focus();
  }
  function renderTagList() {
    const q = pfilter.value.trim().toLowerCase();
    const tags = [...tagCount.keys()].filter(t => !q || t.toLowerCase().includes(q)).sort();
    ptitle.textContent = "tags — " + tags.length;
    plist.innerHTML = "";
    tags.forEach(t => {
      const row = document.createElement("div");
      row.className = "prow";
      const lbl = document.createElement("span");
      lbl.className = "plbl"; lbl.textContent = "#" + t + "   (" + tagCount.get(t) + ")";
      lbl.onclick = () => openNodePicker("#" + t, n => (n.tags || []).includes(t), openTagBrowser);
      const pin = document.createElement("button");
      const onbar = barTags.has(t);
      pin.className = "pinbtn" + (onbar ? " pinned" : "");
      pin.textContent = onbar ? "on bar ✓" : "pin to bar";
      pin.title = onbar ? "remove from toolbar" : "add to toolbar for quick access";
      pin.onclick = e => {
        e.stopPropagation();
        onbar ? barTags.delete(t) : barTags.add(t);
        renderTagChips(); renderTagList();
      };
      row.append(lbl, pin);
      plist.appendChild(row);
    });
    pcount.textContent = tags.length + " tags";
  }

  // Menu-browser mode: targets organized by group, mirroring the `makexx -i`
  // help menu. Foldable nested section headers, HELP text per target, search
  // across name/description/group, and a folded "Undocumented" bucket for
  // targets with no HELP. Click a target to toggle it as a seed.
  const UNDOC = "__undoc__";              // sentinel fold key for Undocumented
  // Undocumented folds by default; groups declared `MENU(..., FOLDED)` start
  // folded too, mirroring the initial fold state of `makexx -i`.
  const menuFolded = new Set([UNDOC, ...(G.folded_groups || [])]);
  function openMenuBrowser() {
    paddall.hidden = true; pback.hidden = true; pickBack = null; curRender = renderMenuList;
    pfilter.value = ""; picker.hidden = false; curRender(); pfilter.focus();
  }
  function menuRow(n, depth) {
    const on = pinned.has(n.id);
    const row = document.createElement("div");
    row.className = "prow" + (on ? " on" : "");
    row.style.paddingLeft = (6 + depth * 12) + "px";
    const lbl = document.createElement("span");
    lbl.className = "plbl";
    const help = (n.help || "").split("\n")[0];
    lbl.innerHTML = (on ? "● " : "") + esc(n.id) + (help ? '<span class="mdesc"> — ' + esc(help) + "</span>" : "");
    lbl.title = n.id + (n.help ? " — " + n.help : "");
    row.appendChild(lbl);
    row.onclick = () => { pinned.has(n.id) ? pinned.delete(n.id) : pinned.add(n.id); renderSeedChips(); renderMenuList(); scheduleFilter(); };
    return row;
  }
  function menuHeader(key, label, depth, folded) {
    const h = document.createElement("div");
    h.className = "pgrp";
    h.style.paddingLeft = (6 + depth * 12) + "px";
    h.textContent = (folded ? "▸ " : "▾ ") + label;
    h.onclick = () => { menuFolded.has(key) ? menuFolded.delete(key) : menuFolded.add(key); renderMenuList(); };
    plist.appendChild(h);
  }
  function renderMenuList() {
    const q = pfilter.value.trim().toLowerCase();
    const searching = q.length > 0;
    const match = n => !searching || n.id.toLowerCase().includes(q) ||
      (n.help || "").toLowerCase().includes(q) || (n.group || "").toLowerCase().includes(q);
    // Partition matched targets: documented under their group, the rest undoc.
    const byGroup = new Map();             // group path ("" = ungrouped) -> nodes[]
    const undoc = [];
    let total = 0;
    for (const n of G.nodes) {
      if (!match(n)) continue;
      total++;
      if (n.help && n.help.length) {
        const g = n.group || "";
        if (!byGroup.has(g)) byGroup.set(g, []);
        byGroup.get(g).push(n);
      } else undoc.push(n);
    }
    // Ancestor-closed, lexicographically sorted order (parents before children).
    const allGroups = new Set();
    for (const g of byGroup.keys()) {
      if (!g) continue;
      let pre = "";
      for (const part of g.split("/")) { pre = pre ? pre + "/" + part : part; allGroups.add(pre); }
    }
    const ordered = [...allGroups].sort();
    const anyAncestorFolded = path => {
      if (searching) return false;
      const parts = path.split("/"); let pre = "";
      for (let i = 0; i < parts.length - 1; i++) { pre = pre ? pre + "/" + parts[i] : parts[i]; if (menuFolded.has(pre)) return true; }
      return false;
    };
    ptitle.textContent = "menu — " + total;
    plist.innerHTML = "";
    // Ungrouped documented targets first (no header), like help's "Targets:".
    (byGroup.get("") || []).forEach(n => plist.appendChild(menuRow(n, 0)));
    // Grouped targets, with auto-created parent section headers.
    for (const g of ordered) {
      if (anyAncestorFolded(g)) continue;
      const depth = g.split("/").length - 1;
      const selfFolded = !searching && menuFolded.has(g);
      menuHeader(g, g.split("/").pop(), depth, selfFolded);
      if (selfFolded) continue;
      (byGroup.get(g) || []).forEach(n => plist.appendChild(menuRow(n, depth + 1)));
    }
    // Undocumented (no HELP) at the bottom, folded by default — like the TUI.
    if (undoc.length) {
      const folded = !searching && menuFolded.has(UNDOC);
      menuHeader(UNDOC, "Undocumented (" + undoc.length + ")", 0, folded);
      if (!folded) undoc.forEach(n => plist.appendChild(menuRow(n, 1)));
    }
    pcount.textContent = total + " targets";
  }

  pfilter.addEventListener("input", () => curRender());
  picker.addEventListener("click", e => {
    const pk = e.target.getAttribute && e.target.getAttribute("data-pk");
    if (pk === "close") picker.hidden = true;
    else if (pk === "back" && pickBack) pickBack();
    else if (pk === "addall") {
      const q = pfilter.value.trim().toLowerCase();
      G.nodes.filter(n => pickPred(n) && (!q || n.id.toLowerCase().includes(q))).forEach(n => pinned.add(n.id));
      renderSeedChips(); renderNodePicker(); scheduleFilter();
    }
  });

  function tokenToRegex(tok) {
    const esc = tok.replace(/[.+?^${}()|[\]\\]/g, "\\$&");
    return tok.includes("*") ? new RegExp("^" + esc.replace(/\*/g, ".*") + "$", "i")
                             : new RegExp(esc, "i");   // bare token = substring
  }
  function seedRegexes() {
    return seedInput.value.split(/[\s,]+/).filter(Boolean).map(tokenToRegex);
  }
  function seedActive() { return seedInput.value.trim() !== "" || pinned.size > 0; }
  function isSeed(node, regexes) {
    const d = node.data();
    if (pinned.has(d.id)) return true;
    for (const re of regexes) if (re.test(d.id)) return true;
    return false;
  }

  function applyFilter() {
    cy.nodes().removeClass("seed");
    const nLeaf = cy.nodes().filter(isLeaf).length;
    const big = nLeaf > BIG_NODES || cy.edges().length > BIG_EDGES;
    const seeds = seedActive()
      ? cy.nodes().filter(n => isLeaf(n) && isSeed(n, seedRegexes()))
      : cy.collection();
    seeds.addClass("seed");                          // outline seeds always

    // Reveal `ele` (minus manually-hidden nodes and their edges), lay out, count.
    // Seeds are never hidden — they're the anchors, so they always win.
    const hideColl = cy.nodes().filter(n => hidden.has(n.id()) && !n.hasClass("seed"));
    const show = (ele) => {
      ele = ele.difference(hideColl).difference(hideColl.connectedEdges());
      cy.elements().style("display", "none");
      ele.style("display", "element");
      hideHint(); relayout();
      return ele;
    };

    // Apply the filter only when there are seeds and Filter is on.
    if (seedActive() && filterOn.checked && seeds.length > 0) {
      if (linkMode.checked && seeds.length >= 2) {
        // ↔ Link: "how are these related?" — shortest path between seeds
        // ignoring edge direction, so it finds connections through a shared
        // ancestor / convergence point, not just a directed lineage.
        const anchor = seeds.first();
        let ele = seeds.union(cy.nodes().filter(n => revealed.has(n.id())));
        const disc = [];
        seeds.forEach(s => {
          if (s.same(anchor)) return;
          const r = cy.elements().aStar({ root: anchor, goal: s, directed: false });
          if (r.found) ele = ele.union(r.path); else disc.push(s.id());
        });
        ele = show(ele.union(ele.edgesWith(ele)).union(ele.ancestors()));
        updateCount(disc.length
          ? (ele.filter(isLeaf).length + " shown · not linked to first seed: " + disc.join(", "))
          : ele.filter(isLeaf).length);
        return;
      }
      // "Connect the seeds": every node on a path between two seeds = nodes
      // both downstream of some seed and upstream of some seed.
      const down = seeds.union(seeds.successors().nodes());
      const up   = seeds.union(seeds.predecessors().nodes());
      let vis = down.intersection(up);
      if (toInputs.checked) vis = vis.union(vis.predecessors().nodes());   // upstream to inputs
      if (toFinals.checked) vis = vis.union(vis.successors().nodes());     // downstream to finals
      if (revealed.size) vis = vis.union(cy.nodes().filter(n => revealed.has(n.id())));  // manual expansions
      const ele = show(vis.union(vis.edgesWith(vis)).union(vis.ancestors()));   // + edges + group boxes
      updateCount(ele.filter(isLeaf).length);
      return;
    }
    // Seeds set but nothing matched.
    if (seedActive() && filterOn.checked && seeds.length === 0) {
      cy.elements().style("display", "none"); hideHint(); updateCount(0); return;
    }
    // Not filtering (no seeds, or Filter off). A big graph can't be drawn
    // whole — show a hint and wait for a seed rather than hang dagre on it.
    if (big) {
      // If the user has manually expanded a neighborhood, show that instead
      // of the hint (lets exploration persist after clearing the seed text).
      const rev = cy.nodes().filter(n => revealed.has(n.id()));
      if (rev.length) {
        const ele = show(rev.union(rev.edgesWith(rev)).union(rev.ancestors()));
        updateCount(ele.filter(isLeaf).length);
        return;
      }
      cy.elements().style("display", "none");
      showHint("Large graph — " + nLeaf + " targets, " + cy.edges().length + " deps. Too big to draw "
        + "whole; seed a filter to begin: type a name or pattern (e.g. *_alpha_*) in the Trace box, "
        + "or pick a #tag." + (seedActive() && !filterOn.checked ? "  (Filter is currently off.)" : ""));
      updateCount(seedActive() ? (seeds.length + " seeds · filter off") : null);
      return;
    }
    // Small graph: safe to draw everything (seeds stay highlighted, hidden subtracted).
    const ele = show(cy.elements());
    updateCount(seedActive() ? (seeds.length + " seeds · filter off")
                : (hidden.size ? ele.filter(isLeaf).length : null));
  }

  // Filter only on Enter — live per-keystroke filtering froze large graphs.
  seedInput.addEventListener("keydown", e => { if (e.key === "Enter") scheduleFilter(); });
  toInputs.addEventListener("change", scheduleFilter);
  toFinals.addEventListener("change", scheduleFilter);
  filterOn.addEventListener("change", scheduleFilter);
  linkMode.addEventListener("change", scheduleFilter);
  document.addEventListener("keydown", e => {
    if (e.key === "/" && document.activeElement !== seedInput) { e.preventDefault(); seedInput.focus(); }
    else if (e.key === "Escape" && !picker.hidden) picker.hidden = true;
  });

  // Trigger a download of `href` (data: URI or object URL) named after the graph.
  function download(href, ext) {
    const a = document.createElement("a");
    a.href = href;
    a.download = ((G.title || "makefile_graph").replace(/[^A-Za-z0-9._-]+/g, "_")) + "." + ext;
    document.body.appendChild(a); a.click(); a.remove();
  }

  document.getElementById("bars").addEventListener("click", e => {
    const act = e.target && e.target.getAttribute && e.target.getAttribute("data-act");
    if (!act) return;
    if (act === "menu") openMenuBrowser();
    else if (act === "fit") cy.animate({ fit: { eles: cy.elements(":visible"), padding: 30 } }, { duration: 250 });
    else if (act === "png") {
      // Export the whole rendered (visible) graph at 2x, on the current background.
      const bg = getComputedStyle(document.body).backgroundColor || "#0f1216";
      download(cy.png({ full: true, scale: 2, bg: bg }), "png");
    }
    else if (act === "svg") {
      // Vector export — scales to any size; same visible subset and background.
      const bg = getComputedStyle(document.body).backgroundColor || "#0f1216";
      const blob = new Blob([cy.svg({ full: true, scale: 1, bg: bg })], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      download(url, "svg");
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    else if (act === "theme") setTheme(theme === "dark" ? "light" : "dark");
    else if (act === "clearSeed") { seedInput.value = ""; seedInput.focus(); scheduleFilter(); }
    else if (act === "unhide") { hidden.clear(); scheduleFilter(); }
    else if (act === "collapseAll") api.collapseAll();
    else if (act === "expandAll") api.expandAll();
    else if (act === "clear") {
      seedInput.value = "";
      pinned.clear();
      revealed.clear();
      hidden.clear();
      renderSeedChips();
      toInputs.checked = false; toFinals.checked = false; filterOn.checked = true; linkMode.checked = false;
      selNode = null; stickyHandles = false; placeHandles();
      scheduleFilter();
    }
    else if (act === "reset") {
      // Like Clear, but keeps the seeds (pattern box + pinned chips). Drops the
      // accumulated step-by-step reveals, manual hides, and modifier toggles so
      // you're back to the clean seed-filtered subgraph.
      revealed.clear();
      hidden.clear();
      toInputs.checked = false; toFinals.checked = false; filterOn.checked = true; linkMode.checked = false;
      selNode = null; stickyHandles = false; placeHandles();
      scheduleFilter();
    }
  });

  // --- Hover tooltip (now incl. tags + the recipe commands) -----------------
  const tip = document.getElementById("tip");
  function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }
  function showTip(node, ev) {
    if (node.hasClass("group")) { tip.hidden = true; return; }
    const d = node.data();
    const meta = [d.type, d.ext ? "." + d.ext : null, d.srcline ? "makefile.cpp:" + d.srcline : null].filter(Boolean).join(" · ");
    let html = '<div class="t-name">' + esc(d.id) + "</div>";
    if (meta) html += '<div class="t-meta">' + esc(meta) + "</div>";
    if (d.help) html += '<div class="t-help">' + esc(d.help) + "</div>";
    if (d.desc) html += '<div class="t-desc">' + esc(d.desc) + "</div>";
    if (d.tags && d.tags.length) html += '<div class="t-tags">' + d.tags.map(t => "#" + esc(t)).join("  ") + "</div>";
    if (d.cmds && d.cmds.length) {
      const MAXCMDS = 8, MAXLEN = 110;
      const lines = d.cmds.slice(0, MAXCMDS).map((c, i) => {
        let one = c.replace(/\\\s*\n\s*/g, " ").replace(/\s+/g, " ").trim();   // collapse continuations / whitespace
        if (one.length > MAXLEN) one = one.slice(0, MAXLEN - 1) + "…";
        return '<span class="t-num">' + String(i + 1).padStart(2) + "</span> " + esc(one);
      });
      if (d.cmds.length > MAXCMDS) lines.push('<span class="t-more">… +' + (d.cmds.length - MAXCMDS) + " more</span>");
      html += '<div class="t-cmds">' + lines.join("\n") + "</div>";
    }
    tip.innerHTML = html;
    tip.hidden = false;
    const x = ev.originalEvent.clientX, y = ev.originalEvent.clientY;
    tip.style.left = Math.min(x + 14, window.innerWidth - tip.offsetWidth - 8) + "px";
    tip.style.top = Math.min(y + 14, window.innerHeight - tip.offsetHeight - 8) + "px";
  }
  cy.on("mouseover", "node", e => {
    showTip(e.target, e);
    if (!e.target.hasClass("group")) { stickyHandles = false; selNode = e.target; clearTimeout(hideTimer); placeHandles(); }
  });
  cy.on("mousemove", "node", e => { if (!tip.hidden) showTip(e.target, e); });
  cy.on("mouseout", "node", () => { tip.hidden = true; scheduleHide(); });
  // Single click = select (shows ⊕ expand handles). Double click = toggle seed.
  let lastTapId = null, lastTapAt = 0;
  cy.on("tap", "node", e => {
    const n = e.target;
    if (n.hasClass("group")) return;
    const now = Date.now();
    if (lastTapId === n.id() && now - lastTapAt < 350) {       // double click -> seed
      const id = n.id();
      pinned.has(id) ? pinned.delete(id) : pinned.add(id);
      renderSeedChips(); scheduleFilter();
      lastTapId = null; lastTapAt = 0; return;
    }
    lastTapId = n.id(); lastTapAt = now;
    selNode = n; stickyHandles = true; clearTimeout(hideTimer); placeHandles();   // single click -> pin handles
  });
  cy.on("tap", e => { tip.hidden = true; if (e.target === cy) { selNode = null; stickyHandles = false; placeHandles(); } });
  cy.on("pan zoom", placeHandles);
  cy.on("position", "node", e => { if (selNode && e.target.id() === selNode.id()) placeHandles(); });
  window.addEventListener("resize", placeHandles);

  applyFilter();   // initial view: full graph if small, "seed to begin" hint if big
})();
</script>
</body>
</html>
