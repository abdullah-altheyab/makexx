<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>makexx — dependency graph</title>
<style>
  :root {
    --bg:#0f1216; --panel:#171c22; --line:#2a323c; --fg:#e6edf3; --muted:#8b949e;
    --input:#10b981; --interm:#58a6ff; --final:#f59e0b; --phony:#a78bfa; --tool:#22d3ee;
  }
  * { box-sizing:border-box; }
  /* Keep the `hidden` attribute authoritative: a plain `#id { display:flex }`
     rule outranks the UA `[hidden]` style, which would otherwise leave the
     full-viewport #empty overlay visible and eat every mouse/wheel event. */
  [hidden] { display:none !important; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font:13px/1.4 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  #bar { position:fixed; top:0; left:0; right:0; height:46px; display:flex; align-items:center;
    gap:10px; padding:0 12px; background:var(--panel); border-bottom:1px solid var(--line); z-index:5; }
  #title { font-weight:600; white-space:nowrap; }
  #search { flex:0 0 280px; background:var(--bg); color:var(--fg); border:1px solid var(--line);
    border-radius:6px; padding:6px 9px; outline:none; }
  #search:focus { border-color:var(--interm); }
  button { background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:6px;
    padding:6px 10px; cursor:pointer; }
  button:hover { border-color:var(--interm); }
  #legend { display:flex; gap:12px; margin-left:auto; color:var(--muted); flex-wrap:wrap; }
  #legend span { display:flex; align-items:center; gap:5px; white-space:nowrap; }
  .sw { width:11px; height:11px; border-radius:3px; display:inline-block; }
  #count { color:var(--muted); white-space:nowrap; }
  #cy { position:fixed; top:46px; left:0; right:0; bottom:0; }
  #tip { position:fixed; max-width:340px; background:var(--panel); border:1px solid var(--line);
    border-radius:8px; padding:9px 11px; pointer-events:none; z-index:10; box-shadow:0 6px 24px #0008; }
  #tip .t-name { font-weight:600; word-break:break-all; }
  #tip .t-meta { color:var(--muted); margin-top:2px; }
  #tip .t-help { margin-top:6px; }
  #tip .t-desc { margin-top:6px; color:var(--muted); font-style:italic; }
  #empty { position:fixed; inset:46px 0 0 0; display:flex; align-items:center; justify-content:center;
    color:var(--muted); }
</style>
</head>
<body>
<div id="bar">
  <span id="title">dependency graph</span>
  <input id="search" placeholder="search targets…  ( / to focus )" autocomplete="off">
  <button data-act="fit" title="Fit graph to view">Fit</button>
  <button data-act="collapseAll" title="Fold every group">Fold all</button>
  <button data-act="expandAll" title="Unfold every group">Unfold all</button>
  <span id="legend"></span>
  <span id="count"></span>
</div>
<div id="cy"></div>
<div id="tip" hidden></div>
<div id="empty" hidden>No graph data.</div>

<script>/*__MAKEXX_GRAPH_LIBS__*/</script>
<script>
"use strict";
// Data injected by `makexx --build-graph`; the fallback keeps this file a
// valid, openable page on its own (shows the empty state).
const MAKEXX_GRAPH = /*makexx-data-start*/{"title":"","description":"","nodes":[],"edges":[]}/*makexx-data-end*/;

(function () {
  const G = MAKEXX_GRAPH;
  document.getElementById("title").textContent =
    G.title && G.title.length ? G.title : "dependency graph";

  if (!G.nodes || !G.nodes.length) {
    document.getElementById("empty").hidden = false;
    return;
  }

  cytoscape.use(window.cytoscapeDagre);
  cytoscape.use(window.cytoscapeExpandCollapse);

  // --- Build elements -------------------------------------------------------
  // Group paths become nested compound (parent) nodes so a whole MENU group
  // can be folded as a unit.
  const groupIds = new Set();
  function ensureGroup(path, els) {
    if (!path) return undefined;
    const parts = path.split("/");
    let acc = "";
    let parentId;
    for (let i = 0; i < parts.length; i++) {
      acc = i ? acc + "/" + parts[i] : parts[i];
      const id = "grp:" + acc;
      if (!groupIds.has(id)) {
        groupIds.add(id);
        els.push({ data: { id, label: parts[i], parent: parentId }, classes: "group" });
      }
      parentId = id;
    }
    return parentId;
  }

  const els = [];
  for (const n of G.nodes) {
    const parent = ensureGroup(n.group || "", els);
    els.push({
      data: {
        id: n.id, label: n.label || n.id, parent,
        type: n.type || "intermediate", ext: n.ext || "",
        help: n.help || "", desc: n.desc || ""
      },
      classes: n.type || "intermediate"
    });
  }
  let ei = 0;
  for (const e of G.edges) {
    els.push({
      data: { id: "e" + (ei++), source: e.source, target: e.target },
      classes: e.tool ? "tool" : ""
    });
  }

  // --- Render ---------------------------------------------------------------
  const cy = cytoscape({
    container: document.getElementById("cy"),
    elements: els,
    wheelSensitivity: 0.3,
    style: [
      { selector: "node", style: {
        "label": "data(label)", "font-size": 11, "color": "#e6edf3",
        "text-valign": "center", "text-halign": "center",
        "shape": "round-rectangle", "width": "label", "height": "label",
        "padding": "7px", "background-color": "#30363d",
        "border-width": 1.5, "border-color": "#484f58" } },
      { selector: "node.input",        style: { "border-color": "var(--input)",  "background-color": "#16241d" } },
      { selector: "node.intermediate", style: { "border-color": "var(--interm)", "background-color": "#13233a" } },
      { selector: "node.final",        style: { "border-color": "var(--final)",  "background-color": "#332208", "border-width": 2.5 } },
      { selector: "node.phony",        style: { "border-color": "var(--phony)",  "background-color": "#241a3a" } },
      { selector: "node.tool",         style: { "border-color": "var(--tool)",   "background-color": "#0c2a30" } },
      { selector: "node.group", style: {
        "label": "data(label)", "text-valign": "top", "text-halign": "center",
        "color": "#8b949e", "font-size": 12, "font-weight": "bold",
        "background-color": "#ffffff06", "background-opacity": 1,
        "border-color": "#3a424d", "border-width": 1, "border-style": "dashed",
        "padding": "16px", "text-margin-y": -2 } },
      { selector: "node.cy-expand-collapse-collapsed-node", style: {
        "background-color": "#1f2630", "border-style": "solid", "shape": "round-rectangle" } },
      { selector: "edge", style: {
        "width": 1.4, "line-color": "#3a424d", "target-arrow-color": "#3a424d",
        "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge.tool", style: { "line-style": "dashed", "line-color": "var(--tool)", "target-arrow-color": "var(--tool)" } },
      { selector: ".dim", style: { "opacity": 0.12 } },
      { selector: "node.hit", style: { "border-color": "#ffffff", "border-width": 3 } }
    ],
    layout: dagreLayout()
  });

  function dagreLayout() {
    return { name: "dagre", rankDir: "LR", nodeSep: 22, rankSep: 60, edgeSep: 10, fit: true, padding: 30 };
  }

  const api = cy.expandCollapse({
    layoutBy: dagreLayout, fisheye: false, animate: false, undoable: false,
    expandCollapseCascade: true
  });

  // --- Legend + counts ------------------------------------------------------
  const present = new Set(G.nodes.map(n => n.type || "intermediate"));
  const order = [["input","input"],["intermediate","intermediate"],["final","final"],["phony","phony"],["tool","tool"]];
  const colors = { input:"var(--input)", intermediate:"var(--interm)", final:"var(--final)", phony:"var(--phony)", tool:"var(--tool)" };
  const legend = document.getElementById("legend");
  for (const [cls,label] of order) {
    if (!present.has(cls)) continue;
    const s = document.createElement("span");
    s.innerHTML = '<i class="sw" style="background:'+colors[cls]+'"></i>'+label;
    legend.appendChild(s);
  }
  document.getElementById("count").textContent =
    G.nodes.length + " targets · " + G.edges.length + " deps";

  // --- Search ---------------------------------------------------------------
  const search = document.getElementById("search");
  function applySearch(q) {
    q = (q || "").trim().toLowerCase();
    cy.elements().removeClass("dim hit");
    if (!q) return;
    const hits = cy.nodes().filter(n => {
      if (n.hasClass("group")) return false;
      const d = n.data();
      return (d.id && d.id.toLowerCase().includes(q)) ||
             (d.label && d.label.toLowerCase().includes(q)) ||
             (d.help && d.help.toLowerCase().includes(q)) ||
             (d.desc && d.desc.toLowerCase().includes(q));
    });
    if (!hits.length) { cy.elements().addClass("dim"); return; }
    const keep = hits.closedNeighborhood();
    cy.elements().addClass("dim");
    keep.removeClass("dim");
    hits.addClass("hit");
  }
  search.addEventListener("input", () => applySearch(search.value));
  search.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const hits = cy.nodes(".hit");
      if (hits.length) cy.animate({ fit: { eles: hits, padding: 60 } }, { duration: 250 });
    } else if (e.key === "Escape") { search.value = ""; applySearch(""); search.blur(); }
  });
  document.addEventListener("keydown", e => {
    if (e.key === "/" && document.activeElement !== search) { e.preventDefault(); search.focus(); }
  });

  // --- Buttons --------------------------------------------------------------
  document.getElementById("bar").addEventListener("click", e => {
    const act = e.target && e.target.getAttribute && e.target.getAttribute("data-act");
    if (!act) return;
    if (act === "fit") cy.animate({ fit: { padding: 30 } }, { duration: 250 });
    else if (act === "collapseAll") api.collapseAll();
    else if (act === "expandAll") api.expandAll();
  });

  // --- Hover tooltip --------------------------------------------------------
  const tip = document.getElementById("tip");
  function showTip(node, ev) {
    if (node.hasClass("group")) { tip.hidden = true; return; }
    const d = node.data();
    const meta = [d.type, d.ext ? "." + d.ext : null].filter(Boolean).join(" · ");
    let html = '<div class="t-name">' + esc(d.id) + "</div>";
    if (meta) html += '<div class="t-meta">' + esc(meta) + "</div>";
    if (d.help) html += '<div class="t-help">' + esc(d.help) + "</div>";
    if (d.desc) html += '<div class="t-desc">' + esc(d.desc) + "</div>";
    tip.innerHTML = html;
    tip.hidden = false;
    const x = ev.originalEvent.clientX, y = ev.originalEvent.clientY;
    const w = tip.offsetWidth, h = tip.offsetHeight;
    tip.style.left = Math.min(x + 14, window.innerWidth - w - 8) + "px";
    tip.style.top = Math.min(y + 14, window.innerHeight - h - 8) + "px";
  }
  function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }
  cy.on("mouseover", "node", e => showTip(e.target, e));
  cy.on("mousemove", "node", e => { if (!tip.hidden) showTip(e.target, e); });
  cy.on("mouseout", "node", () => { tip.hidden = true; });
  cy.on("tap", () => { tip.hidden = true; });
})();
</script>
</body>
</html>
